name: Bug 报告
description: 报告缺陷或回归
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        请先阅读 `HARNESS_ENGINEERING.md`（画布行为）与 `PROJECT_GUIDE.md`（命令与目录）。
  - type: textarea
    id: expected
    attributes:
      label: 期望行为
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际行为
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: 复现步骤（含 YAML 片段或导入方式）
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: 环境（浏览器 / 本地 dev / 构建镜像等）
    validations:
      required: false

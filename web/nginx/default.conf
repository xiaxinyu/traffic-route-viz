server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Same-origin Azure OpenAI proxy (optional): docker-entrypoint.d/40-trv-route-merge-ai-proxy.sh
  # reads /config.json (routeMergeAi) and writes /etc/nginx/snippets/trv-route-merge-ai.conf.
  # Must use ^~ so requests are not swallowed by the SPA fallback in location /.
  include /etc/nginx/snippets/trv-route-merge-ai.conf;

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Do not cache runtime config (K8s ConfigMap)
  location = /config.json {
    add_header Cache-Control "no-store";
    try_files $uri =404;
  }
}

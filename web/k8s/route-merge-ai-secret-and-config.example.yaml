# 示例：路由合并 AI 使用 Kubernetes Secret 保存密钥，ConfigMap 提供非敏感 `config.json`。
# 应用前请修改命名空间、资源名与占位 URL。
# 更完整的 Deployment / Service / Ingress / NetworkPolicy 见仓库根目录 `k8s/traffic-route-viz.yaml`。

---
apiVersion: v1
kind: Secret
metadata:
  name: traffic-route-viz-azure-openai
  labels:
    app.kubernetes.io/name: traffic-route-viz
stringData:
  AZURE_OPENAI_API_KEY: ""

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: traffic-route-viz-config
  labels:
    app.kubernetes.io/name: traffic-route-viz
data:
  config.json: |
    {
      "auth": {
        "enabled": true,
        "username": "admin",
        "password": "change-me-in-secret-or-disable-auth",
        "ttlHours": 8
      },
      "routeMergeAi": {
        "enabled": true,
        "baseUrl": "https://YOUR_RESOURCE_NAME.cognitiveservices.azure.com/openai",
        "apiStyle": "azure-deployments",
        "deployment": "gpt-4o",
        "model": "gpt-4o",
        "apiVersion": "2025-04-01-preview",
        "useDevProxy": false,
        "useSameOriginProxy": true
      }
    }

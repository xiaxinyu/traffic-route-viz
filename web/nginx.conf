server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Do not cache runtime config (K8s ConfigMap)
  location = /config.json {
    add_header Cache-Control "no-store";
    try_files $uri =404;
  }
}


# 可选：显式放行本应用到公网 HTTPS + DNS（仅在与「默认拒绝出站」策略叠加时使用）。
# 若集群未限制 Pod 出站，不要 apply 本文件，以免多余策略干扰排查。
#
# kubectl apply -f k8s/traffic-route-viz-egress-netpol.yaml
#
# 与 traffic-route-viz-netpol（入站）同时选中同一 Pod 时，出站仅允许下列端口；
# 若 AI 仍超时，确认企业防火墙是否要求固定代理出口（非直连 443）。

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: traffic-route-viz-egress
  namespace: hds-aswatson-prd
  labels:
    app.kubernetes.io/name: traffic-route-viz
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: traffic-route-viz
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: TCP
          port: 443
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
